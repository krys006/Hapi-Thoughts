{% extends 'base.html' %}

{% block title %}Login — Hapi Vet{% endblock %}

{% block content %}
<!-- Pet Owner login page -->
<div class="login-page">

  <div class="login-card">

    <!-- Clinic branding -->
    <div class="login-header">
      <h1 class="clinic-name">Hapi Vet</h1>
      <p class="clinic-tagline">Hapi Tutz Veterinary Clinic</p>
    </div>

    <!-- Flash messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <!-- Login form -->
    <form method="POST" action="{% url 'owner_login' %}">
      {% csrf_token %}

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          value="{{ email|default:'' }}"
          placeholder="you@email.com"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Your password"
          required
        />
      </div>

      <button type="submit" class="btn-primary">
        Sign In
      </button>

    </form>

    <!-- Links -->
    <div class="login-links">
      <a href="#">Forgot password?</a>
      <span>·</span>
      <a href="{% url 'owner_register' %}">Create an account</a>
    </div>

    <!-- Admin login link 
    <div class="admin-login-link">
      <a href="{% url 'admin_login' %}">Admin login →</a>
    </div>  -->
    
    
  </div>

</div>
{% endblock %}
